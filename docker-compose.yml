version: '3.8'

services:
  # 1. Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: nexusrag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # 2. Relational Database (with pgvector support)
  postgres:
    image: ankane/pgvector:latest
    container_name: nexusrag-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: nexusrag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # 3. Redis Cache & Rate Limiting
  redis:
    image: redis:7-alpine
    container_name: nexusrag-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # 4. FastAPI Ingestion & Retrieval Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexusrag-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@postgres:5432/nexusrag
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - COHERE_API_KEY=${COHERE_API_KEY}
    depends_on:
      - qdrant
      - postgres
      - redis
    restart: unless-stopped

volumes:
  qdrant_data:
  postgres_data:
  redis_data:
